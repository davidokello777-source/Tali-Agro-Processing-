/* ══════════ CRUD HOOK (in-memory) ════════════════════════════ */
function useCRUD(seed) {
  const [items, setItems] = useState(seed);
  const [delTarget, setDelTarget] = useState(null);
  const add    = item => setItems(p => [...p, { id: Date.now(), ...item }]);
  const upd    = (id, patch) => setItems(p => p.map(x => x.id === id ? { ...x, ...patch } : x));
  const askDel = (id, label) => setDelTarget({ id, label });
  const confirmDel = () => { setItems(p => p.filter(x => x.id !== delTarget.id)); setDelTarget(null); };
  const cancelDel  = () => setDelTarget(null);
  return { items, add, upd, askDel, confirmDel, cancelDel, delTarget };
}

    const acct = users.find(x => x.username === u.trim().toLowerCase() && x.active !== false);

      </div>

  );
}

/* ══════════ USER MANAGEMENT (Admin only) ════════════════════ */
const BLANK_U = { username:"", password:"", role:"manager", name:"", active:true };
function Users({ users, setUsers, canDelete }) {
  const [modal, setModal] = useState(null);
  const [form, setForm]   = useState(BLANK_U);
  const [delT, setDelT]   = useState(null);
  const isEdit = modal && modal !== "add";
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const save = () => {
    if (!form.username || !form.password) return alert("Username and password required.");
    if (!isEdit && users.find(u => u.username === form.username)) return alert("Username already exists.");
    if (isEdit) setUsers(p => p.map(x => x.id === form.id ? form : x));
    else setUsers(p => [...p, { id: Date.now(), ...form }]);
    setModal(null);
  };
  const rl = ROLE_INFO[form.role];
  return (
    <div>
      <PH icon="users" title="User Management" sub="Administrator can add, edit and manage all system users" onAdd={() => { setForm(BLANK_U); setModal("add"); }} addLabel="Add User" ac="#1a3a2a" />
      <div style={{ background:"#fff3cd", border:"1px solid #d4a017", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#6d4c00", display:"flex", gap:8 }}>
        <Ico n="warn" s={15} /> <span><strong>Admin only:</strong> Admins have full access. Managers can add & edit. Viewers are read-only.</span>
      </div>
      <Tbl cols={["Name","Username","Role","Status","Actions"]} data={users}
        row={r => [
          <TD key="n" bold>{r.name}</TD>,
          <TD key="u"><code style={{ background:"#f5f5f5", padding:"2px 5px", borderRadius:4, fontSize:11 }}>{r.username}</code></TD>,
          <TD key="r"><Badge text={ROLE_INFO[r.role]?.label||r.role} color={r.role==="admin"?"gold":r.role==="manager"?"green":"blue"}/></TD>,
          <TD key="st"><Badge text={r.active!==false?"Active":"Inactive"} color={r.active!==false?"green":"gray"}/></TD>,
          <TD key="a"><EditBtn onClick={() => { setForm({...r}); setModal(r); }} /><DelBtn onClick={() => setDelT({id:r.id,label:r.name})} disabled={!canDelete}/></TD>,
        ]}
      />
      {delT && <ConfirmDel name={delT.label} onOk={() => { setUsers(p => p.filter(x => x.id !== delT.id)); setDelT(null); }} onNo={() => setDelT(null)} />}
      {modal && (
        <Modal title={isEdit ? "Edit User" : "Add System User"} onClose={() => setModal(null)} accent="#1a3a2a">
          <Grid2>
            <F label="Full Name" span2><Inp value={form.name} onChange={f("name")} placeholder="e.g. John Tumusiime" /></F>
            <F label="Username (login)"><Inp value={form.username} onChange={f("username")} placeholder="e.g. john" disabled={isEdit} sx={{ background: isEdit?"#f5f5f5":"" }} /></F>
            <F label="Password"><Inp type="password" value={form.password} onChange={f("password")} placeholder="Set password" /></F>
            <F label="Role">
              <Sel value={form.role} onChange={f("role")}>
                <option value="admin">Administrator</option>
                <option value="manager">Farm Manager</option>
                <option value="viewer">Viewer (Read-only)</option>
              </Sel>
            </F>
            <F label="Account Status">
              <Sel value={form.active ? "true" : "false"} onChange={e => setForm(p => ({ ...p, active: e.target.value === "true" }))}>
                <option value="true">Active</option>
                <option value="false">Inactive (blocked)</option>
              </Sel>
            </F>
          </Grid2>
          <div style={{ background:"#e8f5e9", borderRadius:8, padding:"8px 12px", marginBottom:12, fontSize:12.5, color:"#1b5e20" }}>
            {form.role==="admin"?"Full access — add, edit, delete and manage users.":form.role==="manager"?"Can add and edit records. Cannot delete or manage users.":"Read-only — can view all data, no changes allowed."}
          </div>
          <button onClick={save} style={{ ...cs.btn, width:"100%", background:"linear-gradient(135deg,#1a3a2a,#2e5c20)", color:"#fff" }}>{isEdit ? "Save Changes" : "Create User"}</button>
        </Modal>
      )}
    </div>
  );
}

  organicManure:"",organicQty:"",organicDate:"",
  irrigation:"Rain-fed",herbicide:"",herbicideDate:"",herbicideRate:"",insecticide:"",insecticideDate:"",insecticideRate:"",

  const { items, add, upd, askDel, confirmDel, cancelDel, delTarget } = crud;
  const [modal, setModal] = useState(null);
  const [form, setForm]   = useState(BLANK_CROP);
  const [tab, setTab]     = useState("basic");
  const isEdit = modal && modal !== "add";

  const open = (r) => { setForm(r ? { ...r } : BLANK_CROP); setTab("basic"); setModal(r || "add"); };
  const save = () => { isEdit ? upd(form.id, form) : add(form); setModal(null); };
  const tabIdx = CROP_TABS.findIndex(t => t.id === tab);

  return (
    <div>
      <PH icon="crops" title="Crop Management" sub={`${items.length} records · Full agronomic detail`} onAdd={() => open(null)} addLabel="Add Crop" canAdd={canEdit} />
      <Tbl cols={["Crop","Variety","Field","Area","Stage","Condition","Est. Yield","P&L","Actions"]} data={items}
        row={r => [
          <TD key="n" bold>{r.name}</TD>,
          <TD key="v">{r.variety||"—"}</TD>,
          <TD key="f">{r.field||"—"}</TD>,
          <TD key="a">{r.area ? `${r.area} ${r.areaUnit}` : "—"}</TD>,
          <TD key="s"><Badge text={r.status} color={r.status==="Harvested"?"blue":r.status==="Failed"?"red":r.status==="Seedling"?"yellow":"green"}/></TD>,
          <TD key="c"><Badge text={r.cropCondition||"—"} color={r.cropCondition==="Excellent"||r.cropCondition==="Good"?"green":r.cropCondition==="Fair"?"yellow":"red"}/></TD>,
          <TD key="y">{r.totalExpectedYield ? `${r.totalExpectedYield} ${r.yieldUnit}` : "—"}</TD>,
          <TD key="pl">{r.inputCost && r.expectedRevenue ? <span style={{color:Number(r.expectedRevenue)>=Number(r.inputCost)?"#1b5e20":"#c62828",fontWeight:600}}>{ugx(Number(r.expectedRevenue)-Number(r.inputCost))}</span> : "—"}</TD>,
          <TD key="a">{canEdit&&<EditBtn onClick={() => open(r)} />}<DelBtn onClick={() => askDel(r.id, r.name)} disabled={!canDelete} /></TD>,
        ]}
      />
      {delTarget && <ConfirmDel name={delTarget.label} onOk={confirmDel} onNo={cancelDel} />}
      {modal && (
        <Modal title={isEdit ? `Edit — ${form.name}` : "Add Crop Record"} onClose={() => setModal(null)} wide>
          <TabBar tabs={CROP_TABS} active={tab} set={setTab} />
          {tab === "basic" && (
            <Grid2>
              <F label="Crop Type"><Sel value={form.name} onChange={f("name")}>{CROP_NAMES.map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Variety / Cultivar"><Inp value={form.variety} onChange={f("variety")} placeholder="e.g. SC403"/></F>
              <F label="Field / Block"><Inp value={form.field} onChange={f("field")} placeholder="e.g. Block A"/></F>
              <F label="Season"><Sel value={form.season} onChange={f("season")}>{["Season A 2025/26","Season B 2025/26","Season A 2026/27","Season B 2026/27","Irrigated Year-Round"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Area (size)"><div style={{display:"flex",gap:6}}><Inp value={form.area} onChange={f("area")} type="number" sx={{flex:1}} placeholder="e.g. 1.5"/><Sel value={form.areaUnit} onChange={f("areaUnit")} sx={{width:100}}><option>acres</option><option>hectares</option></Sel></div></F>
              <F label="Planting Method"><Sel value={form.plantingMethod} onChange={f("plantingMethod")}>{["Direct Seeding","Transplanting","Ratoon Crop","Ridging & Planting"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Planting Date"><Inp type="date" value={form.plantDate} onChange={f("plantDate")}/></F>
              <F label="Expected Harvest Date"><Inp type="date" value={form.harvestDate} onChange={f("harvestDate")}/></F>
              <F label="Seed Quantity"><div style={{display:"flex",gap:6}}><Inp value={form.seedQty} onChange={f("seedQty")} type="number" sx={{flex:1}}/><Sel value={form.seedUnit} onChange={f("seedUnit")} sx={{width:80}}><option>kg</option><option>bags</option><option>g</option></Sel></div></F>
              <F label="Seed Lot Number"><Inp value={form.seedLot} onChange={f("seedLot")} placeholder="e.g. SL-2025-001"/></F>
              <F label="Seed Supplier"><Inp value={form.seedSupplier} onChange={f("seedSupplier")} placeholder="Supplier name"/></F>
              <F label="Plant Population (plants/acre)"><Inp type="number" value={form.plantPopulation} onChange={f("plantPopulation")} placeholder="e.g. 35000"/></F>
              <F label="Row Spacing (cm)"><Inp type="number" value={form.rowSpacing} onChange={f("rowSpacing")} placeholder="e.g. 75"/></F>
            </Grid2>
          )}
          {tab === "soil" && (
            <Grid2>
              <F label="Soil Type"><Sel value={form.soilType} onChange={f("soilType")}>{["Clay","Sandy","Loam","Clay-Loam","Sandy-Loam","Silty","Volcanic"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Soil pH Level"><Inp value={form.soilPH} onChange={f("soilPH")} placeholder="e.g. 6.2"/></F>
              <F label="Last Soil Test Date"><Inp type="date" value={form.lastSoilTest} onChange={f("lastSoilTest")}/></F>
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Fertilizer Programme</span></div>
              <F label="Basal Fertilizer"><Inp value={form.basalFert} onChange={f("basalFert")} placeholder="e.g. DAP"/></F>
              <F label="Basal Qty (kg/acre)"><Inp type="number" value={form.basalQty} onChange={f("basalQty")}/></F>
              <F label="Basal Date"><Inp type="date" value={form.basalDate} onChange={f("basalDate")}/></F>
              <F label="1st Top-dress"><Inp value={form.topDress1} onChange={f("topDress1")} placeholder="e.g. CAN"/></F>
              <F label="1st Qty (kg/acre)"><Inp type="number" value={form.topDress1Qty} onChange={f("topDress1Qty")}/></F>
              <F label="1st Top-dress Date"><Inp type="date" value={form.topDress1Date} onChange={f("topDress1Date")}/></F>
              <F label="2nd Top-dress"><Inp value={form.topDress2} onChange={f("topDress2")} placeholder="e.g. Urea"/></F>
              <F label="2nd Qty (kg/acre)"><Inp type="number" value={form.topDress2Qty} onChange={f("topDress2Qty")}/></F>
              <F label="2nd Top-dress Date"><Inp type="date" value={form.topDress2Date} onChange={f("topDress2Date")}/></F>
              <F label="Organic Manure / Amendment"><Inp value={form.organicManure} onChange={f("organicManure")} placeholder="e.g. Farmyard Manure"/></F>
              <F label="Organic Qty (tonnes)"><Inp type="number" value={form.organicQty} onChange={f("organicQty")}/></F>
              <F label="Organic Application Date"><Inp type="date" value={form.organicDate} onChange={f("organicDate")}/></F>
            </Grid2>
          )}
          {tab === "protect" && (
            <Grid2>
              <F label="Irrigation Method"><Sel value={form.irrigation} onChange={f("irrigation")}>{["Rain-fed","Drip Irrigation","Furrow Irrigation","Sprinkler","Centre Pivot","None"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Last Field Scouting Date"><Inp type="date" value={form.lastScouting} onChange={f("lastScouting")}/></F>
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Weed Management</span></div>
              <F label="Herbicide"><Inp value={form.herbicide} onChange={f("herbicide")} placeholder="e.g. Primextra Gold"/></F>
              <F label="Herbicide Date"><Inp type="date" value={form.herbicideDate} onChange={f("herbicideDate")}/></F>
              <F label="Herbicide Rate (L/ha)"><Inp value={form.herbicideRate} onChange={f("herbicideRate")} placeholder="e.g. 3L/ha"/></F>
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Pest Management</span></div>
              <F label="Insecticide"><Inp value={form.insecticide} onChange={f("insecticide")} placeholder="e.g. Lambda-cyhalothrin"/></F>
              <F label="Insecticide Date"><Inp type="date" value={form.insecticideDate} onChange={f("insecticideDate")}/></F>
              <F label="Insecticide Rate"><Inp value={form.insecticideRate} onChange={f("insecticideRate")} placeholder="e.g. 0.5L/ha"/></F>
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Disease Management</span></div>
              <F label="Fungicide"><Inp value={form.fungicide} onChange={f("fungicide")} placeholder="e.g. Mancozeb"/></F>
              <F label="Fungicide Date"><Inp type="date" value={form.fungicideDate} onChange={f("fungicideDate")}/></F>
              <F label="Fungicide Rate"><Inp value={form.fungicideRate} onChange={f("fungicideRate")} placeholder="e.g. 2.5kg/ha"/></F>
              <F label="Pests / Diseases Observed" span2><Txt value={form.pestObserved} onChange={f("pestObserved")} placeholder="Describe any observed issues"/></F>
            </Grid2>
          )}
          {tab === "monitor" && (
            <Grid2>
              <F label="Current Growth Stage"><Sel value={form.status} onChange={f("status")}>{["Seedling","Vegetative","Flowering","Grain Fill","Maturity","Harvested","Failed"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Crop Condition"><Sel value={form.cropCondition} onChange={f("cropCondition")}>{["Excellent","Good","Fair","Poor","Critical"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Last Inspection Date"><Inp type="date" value={form.lastInspection} onChange={f("lastInspection")}/></F>
              <F label="Yield per Acre"><Inp type="number" value={form.expectedYieldPerAcre} onChange={f("expectedYieldPerAcre")} placeholder="e.g. 30"/></F>
              <F label="Total Expected Yield"><div style={{display:"flex",gap:6}}><Inp type="number" value={form.totalExpectedYield} onChange={f("totalExpectedYield")} sx={{flex:1}}/><Sel value={form.yieldUnit} onChange={f("yieldUnit")} sx={{width:90}}><option>bags</option><option>kg</option><option>tonnes</option><option>crates</option></Sel></div></F>
              <F label="Total Input Cost (UGX)"><Inp type="number" value={form.inputCost} onChange={f("inputCost")}/></F>
              <F label="Expected Revenue (UGX)"><Inp type="number" value={form.expectedRevenue} onChange={f("expectedRevenue")}/></F>
              {form.inputCost && form.expectedRevenue && (
                <F label="Projected Profit / ROI" span2>
                  <div style={{ padding:"9px 12px", background:Number(form.expectedRevenue)>=Number(form.inputCost)?"#e8f5e9":"#ffebee", borderRadius:8, fontWeight:700, color:Number(form.expectedRevenue)>=Number(form.inputCost)?"#1b5e20":"#c62828", fontSize:13 }}>
                    {ugx(Number(form.expectedRevenue)-Number(form.inputCost))} &nbsp;·&nbsp; ROI: {((Number(form.expectedRevenue)/Number(form.inputCost)-1)*100).toFixed(1)}%
                  </div>
                </F>
              )}
              <F label="Agronomist Notes" span2><Txt value={form.notes} onChange={f("notes")} placeholder="Observations, recommendations, issues..."/></F>
            </Grid2>
          )}
          <div style={{ display:"flex", gap:10, marginTop:12, borderTop:"1px solid #e0eed9", paddingTop:12 }}>
            {tabIdx > 0 && <button onClick={() => setTab(CROP_TABS[tabIdx-1].id)} style={{ ...cs.btn, border:"1.5px solid #c8dfc0", background:"#fff", color:"#2e7d32" }}>← Back</button>}
            {tabIdx < CROP_TABS.length-1
              ? <button onClick={() => setTab(CROP_TABS[tabIdx+1].id)} style={{ ...cs.btn, flex:1, background:"linear-gradient(135deg,#2e7d32,#43a047)", color:"#fff" }}>Next →</button>
              : <button onClick={save} style={{ ...cs.btn, flex:1, background:"linear-gradient(135deg,#2e7d32,#43a047)", color:"#fff" }}>{isEdit?"Save Changes":"Save Crop"}</button>
            }
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════ LIVESTOCK ════════════════════════════════════════ */
const BLANK_LIVE = {
  species:"Cattle",breed:"",tag:"",sex:"Female",count:"",ageGroup:"Adult",dob:"",acquired:"",source:"Born on Farm",purchaseCost:"",currentValuePerHead:"",
  health:"Healthy",bodyConditionScore:"3",lastVetVisit:"",vetContact:"",
  vaccineFMD:"",vaccineCBPP:"",vaccineLSD:"",vaccineND:"",vaccineGumboro:"",vaccineBrucellosis:"",
  dewormDate:"",dewormProduct:"",dewormDose:"",lastTreatDate:"",lastTreatCondition:"",lastTreatGiven:"",quarantine:"No",
  housing:"Semi-confined",feedType:"Pasture + Concentrates",dailyFeedPerHead:"",waterSource:"Borehole",feedSupplier:"",
  breedingStatus:"Open",lastServiceDate:"",expectedCalvingDate:"",lastBirthDate:"",offspringThisSeason:"",breedingBullID:"",
  dailyMilkYield:"",lactationNumber:"",milkingFrequency:"2x daily",weeklyEggProd:"",fcr:"",mortalityCount:"",mortalityRate:"",
  currentWeight:"",adg:"",notes:""
};
const LIVE_TABS=[{id:"id",label:"🐄 Identity"},{id:"health",label:"💉 Health & Vaccines"},{id:"feed",label:"🌿 Feeding"},{id:"breed",label:"🐣 Reproduction"},{id:"prod",label:"📈 Production"}];
const SPECIES=["Cattle","Goat","Sheep","Poultry","Pig","Rabbit","Duck","Turkey","Other"];

function Livestock({ crud, canDelete, canEdit }) {
  const { items, add, upd, askDel, confirmDel, cancelDel, delTarget } = crud;
  const [modal, setModal] = useState(null);
  const [form, setForm]   = useState(BLANK_LIVE);
  const [tab, setTab]     = useState("id");
  const isEdit = modal && modal !== "add";
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const open = (r) => { setForm(r ? { ...r } : BLANK_LIVE); setTab("id"); setModal(r || "add"); };
  const save = () => { isEdit ? upd(form.id, form) : add(form); setModal(null); };
  const tabIdx = LIVE_TABS.findIndex(t => t.id === tab);
  const isPoultry = form.species==="Poultry"||form.species==="Duck"||form.species==="Turkey";
  const isCattle  = form.species==="Cattle";

  return (
    <div>
      <PH icon="livestock" title="Livestock Management" sub={`${items.length} groups · ${items.reduce((s,l)=>s+Number(l.count||0),0)} total animals`} onAdd={() => open(null)} addLabel="Add Animals" ac="#1565c0" canAdd={canEdit} />
      <Tbl cols={["Species","Breed","Tag / ID","Count","Sex","Health","BCS","Value/Hd","Actions"]} data={items}
        row={r => [
          <TD key="sp" bold>{r.species}</TD>,
          <TD key="b">{r.breed}</TD>,
          <TD key="t">{r.tag}</TD>,
          <TD key="c">{r.count}</TD>,
          <TD key="sx">{r.sex}</TD>,
          <TD key="h"><Badge text={r.health} color={r.health==="Healthy"?"green":r.health==="Sick"?"red":"yellow"}/></TD>,
          <TD key="bcs">{r.bodyConditionScore||"—"}</TD>,
          <TD key="v">{r.currentValuePerHead ? ugx(r.currentValuePerHead) : "—"}</TD>,
          <TD key="a">{canEdit&&<EditBtn onClick={() => open(r)} />}<DelBtn onClick={() => askDel(r.id, `${r.species} — ${r.tag}`)} disabled={!canDelete} /></TD>,
        ]}
      />
      {delTarget && <ConfirmDel name={delTarget.label} onOk={confirmDel} onNo={cancelDel} />}
      {modal && (
        <Modal title={isEdit ? `Edit — ${form.species} ${form.tag}` : "Add Livestock Record"} onClose={() => setModal(null)} wide>
          <TabBar tabs={LIVE_TABS} active={tab} set={setTab} />
          {tab === "id" && (
            <Grid2>
              <F label="Species"><Sel value={form.species} onChange={f("species")}>{SPECIES.map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Breed"><Inp value={form.breed} onChange={f("breed")} placeholder="e.g. Friesian, Boer, Ross 308"/></F>
              <F label="Tag / Flock ID"><Inp value={form.tag} onChange={f("tag")} placeholder="e.g. COW-001"/></F>
              <F label="Sex"><Sel value={form.sex} onChange={f("sex")}><option>Female</option><option>Male</option><option>Mixed Flock</option><option>Castrated</option></Sel></F>
              <F label="Number of Animals"><Inp type="number" value={form.count} onChange={f("count")}/></F>
              <F label="Age Group"><Sel value={form.ageGroup} onChange={f("ageGroup")}>{["Neonate (0-1 week)","Calf/Chick/Kid (1wk-3mo)","Weaner (3-6 months)","Grower (6-12 months)","Young Adult (1-2 years)","Adult (2+ years)","Senior","Mixed"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Date of Birth / Hatch Date"><Inp type="date" value={form.dob} onChange={f("dob")}/></F>
              <F label="Date Acquired / Placed"><Inp type="date" value={form.acquired} onChange={f("acquired")}/></F>
              <F label="Source"><Sel value={form.source} onChange={f("source")}>{["Born on Farm","Local Market","Other Farm","Hatchery","Auction","Imported"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Purchase Cost (UGX total)"><Inp type="number" value={form.purchaseCost} onChange={f("purchaseCost")}/></F>
              <F label="Current Value per Head (UGX)"><Inp type="number" value={form.currentValuePerHead} onChange={f("currentValuePerHead")}/></F>
              <F label="Live Weight (kg avg)"><Inp type="number" value={form.currentWeight} onChange={f("currentWeight")}/></F>
              <F label="Avg Daily Gain (kg/day)"><Inp type="number" value={form.adg} onChange={f("adg")} placeholder="e.g. 0.8"/></F>
              <F label="Quarantine Status"><Sel value={form.quarantine} onChange={f("quarantine")}><option>No</option><option>Yes — In quarantine</option><option>Cleared</option></Sel></F>
            </Grid2>
          )}
          {tab === "health" && (
            <Grid2>
              <F label="Health Status"><Sel value={form.health} onChange={f("health")}>{["Healthy","Sick","Under Treatment","Recovering","Quarantined"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Body Condition Score (1–5)"><Sel value={form.bodyConditionScore} onChange={f("bodyConditionScore")}>{["1 — Emaciated","1.5","2 — Thin","2.5","3 — Moderate","3.5","4 — Good","4.5","5 — Obese"].map(x=><option key={x} value={x.split(" ")[0]}>{x}</option>)}</Sel></F>
              <F label="Last Vet Visit"><Inp type="date" value={form.lastVetVisit} onChange={f("lastVetVisit")}/></F>
              <F label="Vet Contact"><Inp value={form.vetContact} onChange={f("vetContact")} placeholder="Name and phone"/></F>
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Vaccination Dates</span></div>
              {!isPoultry&&<>
                <F label="FMD Vaccine Date"><Inp type="date" value={form.vaccineFMD} onChange={f("vaccineFMD")}/></F>
                <F label="CBPP Vaccine Date"><Inp type="date" value={form.vaccineCBPP} onChange={f("vaccineCBPP")}/></F>
                <F label="LSD Vaccine Date"><Inp type="date" value={form.vaccineLSD} onChange={f("vaccineLSD")}/></F>
                <F label="Brucellosis Vaccine"><Inp type="date" value={form.vaccineBrucellosis} onChange={f("vaccineBrucellosis")}/></F>
              </>}
              {isPoultry&&<>
                <F label="Newcastle Disease (ND)"><Inp type="date" value={form.vaccineND} onChange={f("vaccineND")}/></F>
                <F label="Gumboro (IBD) Date"><Inp type="date" value={form.vaccineGumboro} onChange={f("vaccineGumboro")}/></F>
              </>}
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Deworming & Treatment</span></div>
              <F label="Last Deworming Date"><Inp type="date" value={form.dewormDate} onChange={f("dewormDate")}/></F>
              <F label="Deworming Product"><Inp value={form.dewormProduct} onChange={f("dewormProduct")} placeholder="e.g. Albendazole"/></F>
              <F label="Dose / Rate"><Inp value={form.dewormDose} onChange={f("dewormDose")} placeholder="e.g. 10ml/head"/></F>
              <F label="Last Treatment Date"><Inp type="date" value={form.lastTreatDate} onChange={f("lastTreatDate")}/></F>
              <F label="Condition Treated"><Inp value={form.lastTreatCondition} onChange={f("lastTreatCondition")} placeholder="e.g. Mastitis"/></F>
              <F label="Treatment Given" span2><Txt value={form.lastTreatGiven} onChange={f("lastTreatGiven")} placeholder="Drug, dose, duration"/></F>
            </Grid2>
          )}
          {tab === "feed" && (
            <Grid2>
              <F label="Housing System"><Sel value={form.housing} onChange={f("housing")}>{["Free-range","Confined (Zero-grazing)","Semi-confined","Paddock Grazing","Rotational Grazing","Deep Litter","Cage System"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Feed Type / Programme"><Sel value={form.feedType} onChange={f("feedType")}>{["Pasture Only","Concentrates Only","Pasture + Concentrates","Total Mixed Ration (TMR)","Broiler Starter","Broiler Finisher","Layer Mash","Dairy Meal","Pig Grower","Custom Mix"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Daily Feed per Head (kg)"><Inp type="number" value={form.dailyFeedPerHead} onChange={f("dailyFeedPerHead")} placeholder="kg per animal per day"/></F>
              <F label="Water Source"><Sel value={form.waterSource} onChange={f("waterSource")}>{["Borehole","River / Stream","Rain Catchment","Dam / Pond","Piped Water","Water Bowser"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Feed Supplier" span2><Inp value={form.feedSupplier} onChange={f("feedSupplier")}/></F>
              {form.count && form.dailyFeedPerHead && (
                <F label="Total Daily Feed Required" span2>
                  <div style={{ padding:"9px 12px", background:"#e3f2fd", borderRadius:8, fontWeight:700, color:"#1565c0", fontSize:13 }}>
                    {(Number(form.count)*Number(form.dailyFeedPerHead)).toFixed(1)} kg/day &nbsp;·&nbsp; {(Number(form.count)*Number(form.dailyFeedPerHead)*30).toFixed(0)} kg/month
                  </div>
                </F>
              )}
            </Grid2>
          )}
          {tab === "breed" && (
            <Grid2>
              <F label="Breeding Status"><Sel value={form.breedingStatus} onChange={f("breedingStatus")}>{["Open","Pregnant","Lactating","Dry","Growing (pre-breeding)","N/A","Mixed Flock"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Sire / Bull / Buck ID"><Inp value={form.breedingBullID} onChange={f("breedingBullID")} placeholder="Sire ID"/></F>
              <F label="Last Service / AI Date"><Inp type="date" value={form.lastServiceDate} onChange={f("lastServiceDate")}/></F>
              <F label="Expected Calving / Kidding Date"><Inp type="date" value={form.expectedCalvingDate} onChange={f("expectedCalvingDate")}/></F>
              <F label="Last Birth / Hatch Date"><Inp type="date" value={form.lastBirthDate} onChange={f("lastBirthDate")}/></F>
              <F label="Offspring Born This Season"><Inp type="number" value={form.offspringThisSeason} onChange={f("offspringThisSeason")}/></F>
            </Grid2>
          )}
          {tab === "prod" && (
            <Grid2>
              {isCattle && <>
                <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"0 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase"}}>Dairy Production</span></div>
                <F label="Daily Milk Yield (L/cow)"><Inp type="number" value={form.dailyMilkYield} onChange={f("dailyMilkYield")} placeholder="e.g. 18"/></F>
                <F label="Lactation Number"><Inp type="number" value={form.lactationNumber} onChange={f("lactationNumber")} placeholder="e.g. 3"/></F>
                <F label="Milking Frequency"><Sel value={form.milkingFrequency} onChange={f("milkingFrequency")}><option>2x daily</option><option>3x daily</option><option>Once daily</option><option>Not milking</option></Sel></F>
                {form.count && form.dailyMilkYield && (
                  <F label="Herd Total Daily Production">
                    <div style={{ padding:"9px 12px", background:"#e8f5e9", borderRadius:8, fontWeight:700, color:"#1b5e20", fontSize:13 }}>
                      {(Number(form.count)*Number(form.dailyMilkYield)).toFixed(0)} L/day &nbsp;·&nbsp; {(Number(form.count)*Number(form.dailyMilkYield)*30).toFixed(0)} L/month
                    </div>
                  </F>
                )}
              </>}
              {isPoultry && <>
                <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"0 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase"}}>Poultry Production</span></div>
                <F label="Weekly Egg Production (layers)"><Inp type="number" value={form.weeklyEggProd} onChange={f("weeklyEggProd")}/></F>
                <F label="Feed Conversion Ratio (FCR)"><Inp type="number" value={form.fcr} onChange={f("fcr")} placeholder="e.g. 1.8"/></F>
                <F label="Mortality Count (this batch)"><Inp type="number" value={form.mortalityCount} onChange={f("mortalityCount")}/></F>
                <F label="Mortality Rate (%)"><Inp type="number" value={form.mortalityRate} onChange={f("mortalityRate")}/></F>
              </>}
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase"}}>Weight & Growth</span></div>
              <F label="Live Weight (kg avg)"><Inp type="number" value={form.currentWeight} onChange={f("currentWeight")}/></F>
              <F label="Avg Daily Gain (kg/day)"><Inp type="number" value={form.adg} onChange={f("adg")} placeholder="e.g. 0.8"/></F>

            <F label="Payment Status"><Sel value={form.payment} onChange={f("payment")}>{["Paid","Pending","Partial"].map(x=><option key={x}>{x}</option>)}</Sel></F>
            <F label="Payment Method"><Sel value={form.paymentMethod} onChange={f("paymentMethod")}>{["Cash","Mobile Money (MTN)","Mobile Money (Airtel)","Bank Transfer","Cheque","Credit (30 days)","Credit (60 days)"].map(x=><option key={x}>{x}</option>)}</Sel></F>
            <F label="Payment Date"><Inp type="date" value={form.paymentDate} onChange={f("paymentDate")}/></F>
            {form.payment!=="Paid"&&lineTotal>0&&<F label="Balance Due" span2>
              <div style={{padding:"9px 12px",background:"#ffebee",borderRadius:8,fontWeight:700,color:"#c62828",fontSize:13}}>
                Outstanding: {ugx(lineTotal)} — {form.payment==="Pending"?"Full amount not yet received":"Partial payment made"}
              </div>
            </F>}
          </Grid2>}
          {tab==="delivery"&&<Grid2>
            <F label="Delivery Address" span2><Inp value={form.address} onChange={f("address")} placeholder="Customer delivery address"/></F>
            <F label="Delivered / Sold By"><Inp value={form.deliveredBy} onChange={f("deliveredBy")} placeholder="Staff member name"/></F>
            <F label="Notes / Terms" span2><Txt value={form.notes} onChange={f("notes")} placeholder="Any notes, special terms, customer preferences..."/></F>
          </Grid2>}
          <div style={{display:"flex",gap:10,marginTop:12,borderTop:"1px solid #e0eed9",paddingTop:12}}>
            {ti>0&&<button onClick={()=>setTab(STABS[ti-1].id)} style={{padding:"10px 16px",border:"1.5px solid #c8dfc0",borderRadius:9,background:"#fff",cursor:"pointer",fontWeight:600,fontSize:13,color:"#c62828"}}>← Back</button>}
            {ti<STABS.length-1
              ?<button onClick={()=>setTab(STABS[ti+1].id)} style={{flex:1,padding:10,background:"linear-gradient(135deg,#c62828,#e53935)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>Next →</button>
              :<button onClick={save} style={{flex:1,padding:10,background:"linear-gradient(135deg,#c62828,#e53935)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>{isEdit?"Save Changes":"Save Sale"}</button>
            }

        </Modal>
      )}
    </div>
  );
}


const ETABS=[{id:"basic",label:"💸 Expense Details"},{id:"payment",label:"💳 Payment Info"},{id:"extra",label:"📋 Approval & Notes"}];
const BKEX={date:"",type:"Seeds Purchase",subType:"Crop Input",amount:"",vendor:"",receiptNo:"",paymentMethod:"Cash",paidBy:"",approvedBy:"",description:"",notes:""};
const ETYPES=["Seeds Purchase","Fertilizer","Animal Feed","Salaries","Equipment Repair","Veterinary","Transport","Utilities","Insurance","Land Rent","Marketing","Packaging","Processing","Other"];
const ECAT={"Seeds Purchase":"Crop Input","Fertilizer":"Crop Input","Animal Feed":"Livestock","Salaries":"Labour","Equipment Repair":"Maintenance","Veterinary":"Livestock","Transport":"Operations","Utilities":"Operations","Insurance":"Overhead","Land Rent":"Overhead","Marketing":"Operations","Packaging":"Processing","Processing":"Processing","Other":"Other"};
function Expenses({crud,canDelete,canEdit}){
  const{items,add,upd,askDel,confirmDel,cancelDel,delTarget}=crud;
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState(BKEX);
  const[tab,setTab]=useState("basic");
  const isEdit=modal&&modal!=="add";
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const open=r=>{setForm(r?{...r}:BKEX);setTab("basic");setModal(r||"add");};
  const save=()=>{isEdit?upd(form.id,form):add(form);setModal(null);};
  const ti=ETABS.findIndex(t=>t.id===tab);
  const total=items.reduce((s,e)=>s+Number(e.amount||0),0);
  const byT=items.reduce((a,e)=>{a[e.type]=(a[e.type]||0)+Number(e.amount||0);return a;},{});
  const byCat=items.reduce((a,e)=>{const c=e.subType||"Other";a[c]=(a[c]||0)+Number(e.amount||0);return a;},{});
  return(
    <div className="pg">
      <PH icon="expenses" title="Expenses" sub={`Total: ${ugx(total)} \u00b7 ${items.length} records`} onAdd={()=>open(null)} addLabel="Add Expense" ac="#e65100" canAdd={canEdit}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(145px,1fr))",gap:10,marginBottom:13}}>
        {Object.entries(byCat).map(([t,v])=>(
          <div key={t} style={{background:"#fff",borderRadius:10,padding:".85rem",boxShadow:"0 2px 8px rgba(0,0,0,.06)",borderLeft:"3px solid #e65100"}}>
            <div style={{fontSize:10.5,color:"#888",textTransform:"uppercase",letterSpacing:".4px"}}>{t}</div>
            <div style={{fontSize:14,fontWeight:800,color:"#bf360c",marginTop:2}}>{ugx(v)}</div>
            <div style={{marginTop:5,height:4,background:"#f5f5f5",borderRadius:2}}><div style={{width:`${Math.min(100,(v/total)*100)}%`,height:4,background:"#e65100",borderRadius:2}}/></div>
          </div>
        ))}
      </div>
      <Tbl cols={["Date","Type","Category","Amount","Vendor","Receipt No.","Method","Paid By","Approved By","Actions"]} data={items}
        row={r=>[
          <TD key="d">{r.date}</TD>,
          <TD key="t" bold>{r.type}</TD>,
          <TD key="st"><Badge text={r.subType||"—"} color="gray"/></TD>,
          <TD key="a" bold>{ugx(r.amount)}</TD>,
          <TD key="v">{r.vendor||"—"}</TD>,
          <TD key="rc">{r.receiptNo?<code style={{fontSize:11,background:"#f5f5f5",padding:"2px 5px",borderRadius:4}}>{r.receiptNo}</code>:"—"}</TD>,
          <TD key="pm">{r.paymentMethod||"—"}</TD>,
          <TD key="pb">{r.paidBy||"—"}</TD>,
          <TD key="ab">{r.approvedBy||"—"}</TD>,
          <TD key="ac">{canEdit&&<EditBtn onClick={()=>open(r)}/>}<DelBtn onClick={()=>askDel(r.id,r.type)} disabled={!canDelete}/></TD>,
        ]}
      />
      {delTarget&&<ConfirmDel name={delTarget.label} onOk={confirmDel} onNo={cancelDel}/>}
      {modal&&(
        <Modal title={isEdit?"Edit Expense":"Add Expense Record"} onClose={()=>setModal(null)} accent="#e65100" wide>
          <TabBar tabs={ETABS} active={tab} set={setTab}/>
          {tab==="basic"&&<Grid2>
            <F label="Date"><Inp type="date" value={form.date} onChange={f("date")}/></F>
            <F label="Amount (UGX)"><Inp type="number" value={form.amount} onChange={f("amount")}/></F>
            <F label="Expense Type"><Sel value={form.type} onChange={e=>{const v=e.target.value;setForm(p=>({...p,type:v,subType:ECAT[v]||"Other"}));}}>{ETYPES.map(x=><option key={x}>{x}</option>)}</Sel></F>
            <F label="Category (Auto)"><Sel value={form.subType} onChange={f("subType")}>{["Crop Input","Livestock","Labour","Maintenance","Operations","Overhead","Processing","Other"].map(x=><option key={x}>{x}</option>)}</Sel></F>
            <F label="Vendor / Payee"><Inp value={form.vendor} onChange={f("vendor")} placeholder="Who was paid"/></F>
            <F label="Description" span2><Inp value={form.description} onChange={f("description")} placeholder="What was purchased or paid for"/></F>
          </Grid2>}
          {tab==="payment"&&<Grid2>
            <F label="Receipt / Invoice Number"><Inp value={form.receiptNo} onChange={f("receiptNo")} placeholder="e.g. RCP-001-2026"/></F>
            <F label="Payment Method"><Sel value={form.paymentMethod} onChange={f("paymentMethod")}>{["Cash","Mobile Money (MTN)","Mobile Money (Airtel)","Bank Transfer","Cheque","Petty Cash","Credit"].map(x=><option key={x}>{x}</option>)}</Sel></F>
            <F label="Paid By (Staff Name)" span2><Inp value={form.paidBy} onChange={f("paidBy")} placeholder="Who made the payment"/></F>
          </Grid2>}
          {tab==="extra"&&<Grid2>
            <F label="Approved By" span2><Inp value={form.approvedBy} onChange={f("approvedBy")} placeholder="Manager or Admin who approved this expense"/></F>
            <F label="Notes / Remarks" span2><Txt value={form.notes} onChange={f("notes")} placeholder="Any additional notes, follow-up actions, next service date..."/></F>
          </Grid2>}
          <div style={{display:"flex",gap:10,marginTop:12,borderTop:"1px solid #e0eed9",paddingTop:12}}>
            {ti>0&&<button onClick={()=>setTab(ETABS[ti-1].id)} style={{padding:"10px 16px",border:"1.5px solid #c8dfc0",borderRadius:9,background:"#fff",cursor:"pointer",fontWeight:600,fontSize:13,color:"#e65100"}}>← Back</button>}
            {ti<ETABS.length-1
              ?<button onClick={()=>setTab(ETABS[ti+1].id)} style={{flex:1,padding:10,background:"linear-gradient(135deg,#e65100,#f57c00)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>Next →</button>
              :<button onClick={save} style={{flex:1,padding:10,background:"linear-gradient(135deg,#e65100,#f57c00)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>{isEdit?"Save Changes":"Save Expense"}</button>
            }
          </div>
        </Modal>
      )}
    </div>
  );
}

function Reports({ data }) {
  const rev=data.sales.reduce((s,x)=>s+Number(x.unitPrice||x.price||0)*Number(x.qty||1)*(1-Number(x.discount||0)/100),0);
  const exp=data.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const profit=rev-exp;
  const expByT=data.expenses.reduce((a,e)=>{a[e.type]=(a[e.type]||0)+Number(e.amount||0);return a;},{});
  const salesByP=data.sales.reduce((a,s)=>{a[s.product]=(a[s.product]||0)+(Number(s.price||0)*Number(s.qty||1));return a;},{});
  const maxE=Math.max(...Object.values(expByT),1); const maxS=Math.max(...Object.values(salesByP),1);
  const Card=({title,children,color="#2e7d32"})=>(<div style={{background:"#fff",borderRadius:12,padding:"1.3rem",boxShadow:"0 2px 10px rgba(0,0,0,.07)",marginBottom:14,borderTop:`4px solid ${color}`}}><h3 style={{margin:"0 0 .9rem",fontFamily:"Georgia,serif",color:"#1a3a2a",fontSize:"1rem"}}>{title}</h3>{children}</div>);
  const Bar=({label,value,max,color})=>(<div style={{marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{label}</span><span style={{color:"#888"}}>{ugx(value)}</span></div><div style={{background:"#f0f0f0",borderRadius:5,height:8}}><div style={{width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:5,height:8}}/></div></div>);
  return (
    <div>
      <PH icon="reports" title="Reports & Analytics" sub="Farm performance — Uganda Shillings (UGX)"/>
      <Card title="📊 Profit & Loss">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:11}}>
          {[{l:"Revenue",v:ugx(rev),c:"#2e7d32"},{l:"Expenses",v:ugx(exp),c:"#c62828"},{l:"Net Profit",v:ugx(profit),c:profit>=0?"#1565c0":"#c62828"},{l:"Margin",v:`${rev>0?((profit/rev)*100).toFixed(1):0}%`,c:profit>=0?"#00695c":"#c62828"}].map(x=>(<div key={x.l} style={{textAlign:"center",padding:".9rem",background:"#f8fdf6",borderRadius:9}}><div style={{fontSize:16,fontWeight:800,color:x.c}}>{x.v}</div><div style={{fontSize:11.5,color:"#888"}}>{x.l}</div></div>))}
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14}}>
        <Card title="💰 Expenses by Category" color="#f57c00">{Object.entries(expByT).map(([k,v])=><Bar key={k} label={k} value={v} max={maxE} color="#f57c00"/>)}</Card>
        <Card title="🛒 Revenue by Product" color="#1565c0">{Object.entries(salesByP).map(([k,v])=><Bar key={k} label={k} value={v} max={maxS} color="#1565c0"/>)}</Card>
      </div>
      <Card title="🌾 Production & Workforce Summary" color="#4caf50">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:11}}>
          {[{l:"Crop Records",v:data.crops.length},{l:"Harvest Units",v:data.harvest.reduce((s,h)=>s+Number(h.qty||0),0)},{l:"Total Animals",v:data.livestock.reduce((s,l)=>s+Number(l.count||0),0)},{l:"Active Staff",v:data.workers.filter(w=>w.status==="Active").length},{l:"Suppliers",v:data.suppliers.length},{l:"Payroll/mo",v:ugx(data.workers.reduce((s,w)=>s+Number(w.salary||0),0))}].map(x=>(<div key={x.l} style={{textAlign:"center",padding:".9rem",background:"#e8f5e9",borderRadius:9}}><div style={{fontSize:15,fontWeight:800,color:"#1b5e20"}}>{x.v}</div><div style={{fontSize:11,color:"#4a7c59"}}>{x.l}</div></div>))}
        </div>
      </Card>
      <Card title="🌱 Crop Economics Summary" color="#43a047">
        <Tbl cols={["Crop","Field","Area","Stage","Input Cost","Revenue","Profit"]} data={data.crops}
          row={r=>[<TD key="n" bold>{r.name}</TD>,<TD key="f">{r.field||"—"}</TD>,<TD key="a">{r.area?`${r.area} ${r.areaUnit}`:"—"}</TD>,<TD key="s"><Badge text={r.status} color={r.status==="Growing"||r.status==="Vegetative"?"green":r.status==="Harvested"?"blue":"yellow"}/></TD>,<TD key="ic">{r.inputCost?ugx(r.inputCost):"—"}</TD>,<TD key="er">{r.expectedRevenue?ugx(r.expectedRevenue):"—"}</TD>,<TD key="pr">{r.inputCost&&r.expectedRevenue?<span style={{fontWeight:700,color:Number(r.expectedRevenue)>=Number(r.inputCost)?"#1b5e20":"#c62828"}}>{ugx(Number(r.expectedRevenue)-Number(r.inputCost))}</span>:"—"}</TD>]}
        />
      </Card>
    </div>
  );
}

  {id:"users",     l:"Users",      ic:"users",   adminOnly:true},
  {id:"suppliers", l:"Suppliers",  ic:"suppliers"},
  {id:"crops",     l:"Crops",      ic:"crops"},
  {id:"livestock", l:"Livestock",  ic:"livestock"},
  {id:"workers",   l:"Workers",    ic:"workers"},
  {id:"inventory", l:"Inventory",  ic:"inventory"},
  {id:"harvest",   l:"Harvest",    ic:"harvest"},
  {id:"processing",l:"Processing", ic:"processing"},

  {id:"expenses",  l:"Expenses",   ic:"expenses"},

];

function App() {

  const lCRUD   = useCRUD(SEED.livestock);
  const wCRUD   = useCRUD(SEED.workers);
  const invCRUD = useCRUD(SEED.inventory);
  const hvCRUD  = useCRUD(SEED.harvest);
  const prCRUD  = useCRUD(SEED.processing);
  const slCRUD  = useCRUD(SEED.sales);
  const exCRUD  = useCRUD(SEED.expenses);

  const isAdmin  = user?.role === "admin";
  const isViewer = user?.role === "viewer";
  const canEdit  = !isViewer;
  const canDel   = isAdmin;

  const data = { suppliers:supCRUD.items, crops:cCRUD.items, livestock:lCRUD.items, workers:wCRUD.items, inventory:invCRUD.items, harvest:hvCRUD.items, processing:prCRUD.items, sales:slCRUD.items, expenses:exCRUD.items };

  if (!user) return <Login users={users} onLogin={u => { setUser(u); setPage("dashboard"); }} />;

  const navItems = NAV.filter(n => !n.adminOnly || isAdmin);
  const go = id => { setPage(id); setMenu(false); };

  const pageMap = {
    dashboard: <Dashboard data={data} />,
    users:     <Users users={users} setUsers={setUsers} canDelete={canDel} />,
    suppliers: <Suppliers crud={supCRUD} canDelete={canDel} canEdit={canEdit} />,
    crops:     <Crops crud={cCRUD} canDelete={canDel} canEdit={canEdit} />,
    livestock: <Livestock crud={lCRUD} canDelete={canDel} canEdit={canEdit} />,
    workers:   <Workers crud={wCRUD} canDelete={canDel} canEdit={canEdit} />,
    inventory: <Inventory crud={invCRUD} canDelete={canDel} canEdit={canEdit} suppliers={supCRUD.items} />,
    harvest:   <Harvest crud={hvCRUD} canDelete={canDel} canEdit={canEdit} />,

          <div style={{ width:40, height:40, borderRadius:11, background:"linear-gradient(135deg,#d4a017,#f5c842)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, boxShadow:"0 4px 10px rgba(212,160,23,.4)" }}><Ico n="leaf" s={20} /></div>
          <div><div style={{ color:"#fff", fontWeight:800, fontSize:13 }}>Tali Agro</div><div style={{ color:"rgba(255,255,255,.4)", fontSize:10.5 }}>Farm & Processing</div></div>
        </div>
        <div style={{ marginTop:10, padding:"7px 9px", borderRadius:8, background:"rgba(255,255,255,.06)" }}>
          <div style={{ fontSize:10, color:"rgba(255,255,255,.4)" }}>Logged in as</div>
          <div style={{ fontSize:13, fontWeight:700, color:rc.color, marginTop:1 }}>{user.name || user.username}</div>
          <div style={{ fontSize:10.5, color:"rgba(255,255,255,.3)" }}>{rc.label}</div>
          {isViewer && <div style={{ fontSize:10, color:"rgba(255,200,100,.5)", marginTop:2 }}>Read-only access</div>}

        </div>
      </div>
      <nav style={{ flex:1, padding:".6rem .5rem" }}>
        {navItems.map(n => {

            <span style={{ opacity:a?1:.7, flexShrink:0 }}><Ico n={n.ic} s={15} /></span>{n.l}
          </button>;

          {/* Access level banner */}
          {isViewer && <div style={{ background:"#e3f2fd", borderBottom:"1px solid #90caf9", padding:"6px 1.2rem", fontSize:12.5, color:"#1565c0", display:"flex", alignItems:"center", gap:6, flexShrink:0 }}><Ico n="eye" s={13}/> <strong>Viewer mode</strong> — Read-only access. Contact Admin to make changes.</div>}
          {!isAdmin && !isViewer && <div style={{ background:"#fff8e1", borderBottom:"1px solid #ffe082", padding:"6px 1.2rem", fontSize:12.5, color:"#6d4c00", display:"flex", alignItems:"center", gap:6, flexShrink:0 }}><Ico n="shield" s={13}/> <strong>Manager mode</strong> — Add & edit enabled. Only <strong>Admin</strong> can delete.</div>}

          {/* Page */}
          <div style={{ flex:1, overflowY:"auto", padding:"1.2rem 1.4rem" }}>
            {pageMap[page] || <Dashboard data={data} />}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
