
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tali Agro - Farm Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f5ee; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; }
        ::-webkit-scrollbar-thumb { background: #b0cba8; border-radius: 3px; }
        input::placeholder { color: #aab; }
        input:focus, select:focus { border-color: #2e7d32 !important; outline: none; box-shadow: 0 0 0 3px rgba(46,125,50,.12); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─── INITIAL SEED DATA ───────────────────────────────────────────────────────
        const SEED = {
            crops: [
                { id: 1, name: "Maize", field: "Block A", date: "2025-11-10", status: "Growing", notes: "Early season planting" },
                { id: 2, name: "Soyabean", field: "Block B", date: "2025-11-20", status: "Growing", notes: "" },

                { id: 2, type: "Goat", breed: "Boer", tag: "GT-007", health: "Healthy", vaccination: "Due soon", count: 24 },

                { id: 2, name: "Grace Phiri", role: "Livestock Keeper", phone: "+265 888 345 678", salary: 70000, status: "Active" },

                { id: 4, item: "Sprayer Pump", qty: 3, unit: "Units", supplier: "Farm Tools Ltd", date: "2025-09-10", category: "Tools" },

                { id: 2, rawMaterial: "Groundnuts", product: "Groundnut Paste", date: "2026-02-22", batch: "GP-2026-01", inputQty: 20, outputQty: 180, unit: "Jars" },

                { id: 2, customer: "Green Valley Stores", phone: "0888 333 444", product: "Broiler Chicken", qty: 30, price: 8500, payment: "Pending", date: "2026-02-28" },
                { id: 3, customer: "Tali Retail Outlet", phone: "0777 555 666", product: "Groundnut Paste", qty: 100, price: 3200, payment: "Paid", date: "2026-03-01" },
            ],
            expenses: [
                { id: 1, date: "2026-01-05", type: "Seeds Purchase", amount: 125000, description: "SC403 Maize seed procurement" },
                { id: 2, date: "2026-01-12", type: "Fertilizer", amount: 240000, description: "NPK & CAN fertilizer" },
                { id: 3, date: "2026-02-01", type: "Salaries", amount: 320000, description: "January worker salaries" },
                { id: 4, date: "2026-02-10", type: "Equipment Repair", amount: 45000, description: "Tractor service" },
                { id: 5, date: "2026-03-01", type: "Animal Feed", amount: 88000, description: "Broiler feed stock" },
            ],
        };

        // ─── REUSABLE UI COMPONENTS (Translated from original JSx) ─────────────────────
        const Icon = ({ name, size = 20 }) => {
            const icons = {
                dashboard: "M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z",
                crops: "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z",
                livestock: "M4.5 11h-2V9H1v6h1.5v-2.5h2V15H6V9H4.5v2zm2.5-.5h1.5V15H10V10.5h1.5V9H7v1.5zm5.5 0H14V15h1.5v-4.5H17V9h-4.5v1.5zm5.5-1.5v6H19v-2.5h1.5V15H22V9h-4z",
                workers: "M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",
                inventory: "M20 6h-2.18c.07-.44.18-.88.18-1.35C18 2.54 15.96.5 13.46.5 12 .5 10.72 1.15 9.85 2.12L8 4.05 6.15 2.12C5.28 1.15 4 .5 2.54.5.04.5 2 2.54 2 4.65c0 .47.09.91.18 1.35H0v15h20V6zm-8 0H8c-.83 0-1.5-.67-1.5-1.5S7.17 3 8 3s1.5.67 1.5 1.5V5h1.5v-.5C11 3.67 11.67 3 12.5 3S14 3.67 14 4.5 13.33 6 12.5 6H12z",
                harvest: "M12 3L2 12h3v8h6v-5h2v5h6v-8h3L12 3zm0 12.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z",
                processing: "M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z",
                sales: "M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z",
                expenses: "M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z",
                reports: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z",
                logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z",
                add: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
                delete: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
                leaf: "M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 1-8 1 9-3.9 5 7 5 7-2.8-3-6-2-9.5-.13l4.28 4.28L17 8z",
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                    <path d={icons[name] || icons.leaf} />
                </svg>
            );
        };

        const Badge = ({ text, color = "green" }) => {
            const colors = {
                green: { bg: "#d4edda", text: "#155724" },
                yellow: { bg: "#fff3cd", text: "#856404" },
                red: { bg: "#f8d7da", text: "#721c24" },
                blue: { bg: "#cce5ff", text: "#004085" },
                gray: { bg: "#e2e3e5", text: "#383d41" },
            };
            const c = colors[color] || colors.gray;
            return (
                <span style={{
                    background: c.bg, color: c.text, padding: "2px 10px",
                    borderRadius: 12, fontSize: 11, fontWeight: 700, display: "inline-block"
                }}>{text}</span>
            );
        };

        const Table = ({ columns, data, renderRow }) => (
            <div style={{ overflowX: "auto", borderRadius: 12, border: "1.5px solid #e0eed9" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                    <thead>
                        <tr style={{ background: "linear-gradient(90deg,#1a3a2a,#2e5c20)" }}>
                            {columns.map(col => (
                                <th key={col} style={{
                                    padding: "12px 16px", textAlign: "left", color: "#e8f5e9",
                                    fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: ".7px"
                                }}>{col}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {data.length === 0 ? (
                            <tr><td colSpan={columns.length} style={{ textAlign: "center", padding: 32, color: "#999" }}>No records found</td></tr>
                        ) : data.map((item, i) => (
                            <tr key={item.id || i} style={{ background: i % 2 === 0 ? "#fff" : "#f5faf3" }}>
                                {renderRow(item)}
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        );

        const TD = ({ children, bold }) => (
            <td style={{ padding: "12px 16px", borderBottom: "1px solid #edf4eb", fontWeight: bold ? 600 : 400 }}>{children}</td>
        );

        const PageHeader = ({ icon, title, subtitle, onAdd, addLabel = "Add New" }) => (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "1.8rem" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{
                        width: 50, height: 50, borderRadius: 14, background: "linear-gradient(135deg,#2e7d32,#4caf50)",
                        display: "flex", alignItems: "center", justifyContent: "center", color: "#fff"
                    }}><Icon name={icon} size={24} /></div>
                    <div>
                        <h2 style={{ margin: 0, fontFamily: "'Playfair Display', serif", color: "#1a3a2a", fontSize: "1.6rem" }}>{title}</h2>
                        {subtitle && <p style={{ margin: 0, color: "#6b8f5e", fontSize: 13 }}>{subtitle}</p>}
                    </div>
                </div>
                {onAdd && (
                    <button onClick={onAdd} style={{
                        display: "flex", alignItems: "center", gap: 6, padding: "10px 20px",
                        background: "linear-gradient(135deg,#2e7d32,#43a047)", color: "#fff",
                        border: "none", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 14
                    }}><Icon name="add" size={18} /> {addLabel}</button>
                )}
            </div>
        );

        // ─── LOGIN PAGE ─────────────────────────────────────────────────────────────
        const LoginPage = ({ onLogin }) => {
            const [u, setU] = useState("");
            const [p, setP] = useState("");
            const [err, setErr] = useState("");
            const handle = () => {
                if (u === "admin" && p === "tali123") onLogin();
                else setErr("Invalid credentials.");
            };
            return (
                <div style={{
                    minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
                    background: "linear-gradient(160deg,#0d2818 0%,#1b4332 40%,#2d6a4f 100%)"
                }}>
                    <div style={{
                        background: "rgba(255,255,255,.1)", backdropFilter: "blur(20px)",
                        border: "1px solid rgba(255,255,255,.2)", borderRadius: 24,
                        padding: "3rem 2.5rem", width: 350, textAlign: "center", color: "#fff"
                    }}>
                        <div style={{ width: 60, height: 60, borderRadius: 15, background: "#d4a017", margin: "0 auto 1.5rem", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <Icon name="leaf" size={30} />
                        </div>
                        <h2 style={{ fontFamily: "'Playfair Display', serif", marginBottom: "2rem" }}>Tali Agro Login</h2>
                        <input value={u} onChange={e=>setU(e.target.value)} placeholder="Username" style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", marginBottom: 12, background: "rgba(255,255,255,.2)", color: "#fff" }} />
                        <input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="Password" style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", marginBottom: 20, background: "rgba(255,255,255,.2)", color: "#fff" }} />
                        {err && <p style={{ color: "#ff8a80", fontSize: 12, marginBottom: 10 }}>{err}</p>}
                        <button onClick={handle} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", background: "#d4a017", color: "#000", fontWeight: 800, cursor: "pointer" }}>Sign In</button>
                        <p style={{ marginTop: 15, fontSize: 11, opacity: 0.6 }}>admin / tali123</p>
                    </div>
                </div>
            );
        };

        // ─── DASHBOARD ─────────────────────────────────────────────────────────────
        const Dashboard = ({ data }) => {
            const totalSales = data.sales.reduce((s,x)=>s+Number(x.price)*Number(x.qty||1),0);
            const totalExp = data.expenses.reduce((s,x)=>s+Number(x.amount),0);
            const profit = totalSales - totalExp;
            const stats = [
                { label:"Crops", value: data.crops.length, icon:"crops", color:"#2e7d32" },
                { label:"Livestock", value: data.livestock.length, icon:"livestock", color:"#1565c0" },
                { label:"Workers", value: data.workers.length, icon:"workers", color:"#6a1b9a" },
                { label:"Revenue", value: `MK ${totalSales.toLocaleString()}`, icon:"sales", color:"#c62828" },
            ];
            return (
                <div className="fade-in">
                    <h2 style={{ fontFamily: "'Playfair Display', serif", marginBottom: 20 }}>Farm Summary</h2>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 20, marginBottom: 30 }}>
                        {stats.map(s => (
                            <div key={s.label} style={{ background: "#fff", padding: 20, borderRadius: 15, borderLeft: `5px solid ${s.color}`, boxShadow: "0 2px 10px rgba(0,0,0,.05)" }}>
                                <div style={{ color: "#888", fontSize: 12, fontWeight: 700, textTransform: "uppercase" }}>{s.label}</div>
                                <div style={{ fontSize: 24, fontWeight: 800, color: s.color, marginTop: 5 }}>{s.value}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ background: "#fff", padding: 25, borderRadius: 15, boxShadow: "0 2px 10px rgba(0,0,0,.05)" }}>
                        <h3 style={{ marginBottom: 15 }}>Recent Sales</h3>
                        <Table 
                            columns={["Customer", "Product", "Amount", "Status"]}
                            data={data.sales.slice(-5)}
                            renderRow={s => [
                                <TD key="c" bold>{s.customer}</TD>,
                                <TD key="p">{s.product}</TD>,
                                <TD key="a">MK {(s.price * s.qty).toLocaleString()}</TD>,
                                <TD key="st"><Badge text={s.payment} color={s.payment === "Paid" ? "green" : "yellow"} /></TD>
                            ]}
                        />
                    </div>
                </div>
            );
        };

        // ─── MAIN APP COMPONENT ─────────────────────────────────────────────────────
        function App() {
            const [loggedIn, setLoggedIn] = useState(false);
            const [page, setPage] = useState("dashboard");
            const [data, setData] = useState(SEED);

            const navItems = [
                { id: "dashboard", label: "Dashboard", icon: "dashboard" },
                { id: "crops", label: "Crops", icon: "crops" },
                { id: "livestock", label: "Livestock", icon: "livestock" },
                { id: "workers", label: "Workers", icon: "workers" },
                { id: "inventory", label: "Inventory", icon: "inventory" },
                { id: "sales", label: "Sales", icon: "sales" },
                { id: "expenses", label: "Expenses", icon: "expenses" },
            ];

            if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;

            const renderContent = () => {
                switch(page) {
                    case "dashboard": return <Dashboard data={data} />;
                    case "crops": return (
                        <div className="fade-in">
                            <PageHeader icon="crops" title="Crop Management" subtitle="Field tracking and status" />
                            <Table 
                                columns={["Crop", "Field", "Plant Date", "Status"]}
                                data={data.crops}
                                renderRow={c => [
                                    <TD key="1" bold>{c.name}</TD>, <TD key="2">{c.field}</TD>, <TD key="3">{c.date}</TD>, 
                                    <TD key="4"><Badge text={c.status} color="green" /></TD>
                                ]}
                            />
                        </div>
                    );
                    case "livestock": return (
                        <div className="fade-in">
                            <PageHeader icon="livestock" title="Livestock" subtitle="Health and population tracking" />
                            <Table 
                                columns={["Type", "Breed", "Tag", "Count", "Health"]}
                                data={data.livestock}
                                renderRow={l => [
                                    <TD key="1" bold>{l.type}</TD>, <TD key="2">{l.breed}</TD>, <TD key="3">{l.tag}</TD>, 
                                    <TD key="4">{l.count}</TD>, <TD key="5"><Badge text={l.health} color="blue" /></TD>
                                ]}
                            />
                        </div>
                    );
                    case "workers": return (
                        <div className="fade-in">
                            <PageHeader icon="workers" title="Workers" subtitle="Staff management" />
                            <Table 
                                columns={["Name", "Role", "Phone", "Salary"]}
                                data={data.workers}
                                renderRow={w => [
                                    <TD key="1" bold>{w.name}</TD>, <TD key="2">{w.role}</TD>, <TD key="3">{w.phone}</TD>, 
                                    <TD key="4">MK {w.salary.toLocaleString()}</TD>
                                ]}
                            />
                        </div>
                    );
                    default: return <div style={{ padding: 40, textAlign: "center", color: "#888" }}>Section <b>{page}</b> is coming soon in this HTML preview.</div>;
                }
            };

            return (
                <div style={{ display: "flex", minHeight: "100vh" }}>
                    {/* Sidebar */}
                    <div style={{ width: 240, background: "#0d2818", color: "#fff", display: "flex", flexDirection: "column" }}>
                        <div style={{ padding: "2rem 1.5rem", display: "flex", alignItems: "center", gap: 10 }}>
                            <div style={{ background: "#d4a017", padding: 8, borderRadius: 10 }}><Icon name="leaf" size={20} /></div>
                            <span style={{ fontWeight: 800, fontSize: 18 }}>Tali Agro</span>
                        </div>
                        <nav style={{ flex: 1, padding: "0 10px" }}>
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => setPage(item.id)} style={{
                                    width: "100%", padding: "12px 15px", borderRadius: 10, border: "none",
                                    background: page === item.id ? "rgba(212,160,23,.2)" : "transparent",
                                    color: page === item.id ? "#f5c842" : "rgba(255,255,255,.6)",
                                    textAlign: "left", cursor: "pointer", fontWeight: 600, display: "flex", alignItems: "center", gap: 10, marginBottom: 5
                                }}>
                                    <Icon name={item.icon} size={16} /> {item.label}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setLoggedIn(false)} style={{ margin: 20, padding: 12, borderRadius: 10, border: "none", background: "rgba(255,0,0,.1)", color: "#ff8a80", cursor: "pointer" }}>Sign Out</button>
                    </div>

                    {/* Main Content */}
                    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                        <header style={{ background: "#fff", padding: "15px 30px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #e4ede0" }}>
                            <div style={{ fontWeight: 700, color: "#1a3a2a" }}>{navItems.find(i=>i.id===page)?.label}</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <div style={{ fontSize: 12, textAlign: "right" }}>
                                    <div style={{ fontWeight: 700 }}>Admin</div>
                                    <div style={{ opacity: 0.5 }}>Farm Manager</div>
                                </div>
