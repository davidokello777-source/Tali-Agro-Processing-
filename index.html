<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tali Agro Farm & Processing System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#f0f5ee}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:#eee}
  ::-webkit-scrollbar-thumb{background:#a5c99e;border-radius:3px}
  input::placeholder{color:#aab}
  input:focus,select:focus,textarea:focus{border-color:#2e7d32!important;box-shadow:0 0 0 3px rgba(46,125,50,.12);outline:none}
  .nav-btn:hover{background:rgba(255,255,255,.08)!important;color:#fff!important}
  .action-btn:hover{opacity:.85}
  .card-hover:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)!important}
  @media(max-width:768px){
    .sidebar{width:60px!important}
    .nav-label{display:none!important}
    .logo-text{display:none!important}
    .main-content{margin-left:60px!important}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

// Load from localStorage or use seed
function loadData(){
  try{
    const saved=localStorage.getItem("tali_agro_data");
    if(saved) return JSON.parse(saved);
  }catch(e){}
  return SEED;
}
function saveData(d){
  try{localStorage.setItem("tali_agro_data",JSON.stringify(d));}catch(e){}
}

// ── Small components ──────────────────────────────────────────────────────────
const Badge=({text,color="green"})=>{
  const map={green:{bg:"#d4edda",tc:"#155724"},yellow:{bg:"#fff3cd",tc:"#856404"},
    red:{bg:"#f8d7da",tc:"#721c24"},blue:{bg:"#cce5ff",tc:"#004085"},
    gray:{bg:"#e2e3e5",tc:"#383d41"},orange:{bg:"#ffe5cc",tc:"#7a3500"}};
  const c=map[color]||map.gray;
  return <span style={{background:c.bg,color:c.tc,padding:"2px 10px",borderRadius:12,fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>{text}</span>;
};

const Modal=({title,onClose,children,wide})=>(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"1rem"}}>
    <div style={{background:"#fff",borderRadius:16,padding:"2rem",width:"100%",maxWidth:wide?640:480,boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}>
        <h3 style={{margin:0,color:"#1a3a2a",fontFamily:"'Playfair Display',serif",fontSize:"1.25rem"}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:"#888",lineHeight:1}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);

const Inp=({label,...props})=>(
  <div style={{marginBottom:"0.9rem"}}>
    {label&&<label style={{display:"block",fontWeight:600,color:"#2d5016",marginBottom:4,fontSize:13}}>{label}</label>}
    <input {...props} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #c8dfc0",borderRadius:8,fontSize:14,background:"#f8fdf6",boxSizing:"border-box",...props.style}}/>
  </div>
);

const Sel=({label,children,...props})=>(
  <div style={{marginBottom:"0.9rem"}}>
    {label&&<label style={{display:"block",fontWeight:600,color:"#2d5016",marginBottom:4,fontSize:13}}>{label}</label>}
    <select {...props} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #c8dfc0",borderRadius:8,fontSize:14,background:"#f8fdf6",boxSizing:"border-box"}}>{children}</select>
  </div>
);

const Txt=({label,...props})=>(
  <div style={{marginBottom:"0.9rem"}}>
    {label&&<label style={{display:"block",fontWeight:600,color:"#2d5016",marginBottom:4,fontSize:13}}>{label}</label>}
    <textarea {...props} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #c8dfc0",borderRadius:8,fontSize:14,background:"#f8fdf6",boxSizing:"border-box",resize:"vertical",minHeight:72,...props.style}}/>
  </div>
);

const SaveBtn=({onClick,color="#2e7d32",label="Save"})=>(
  <button onClick={onClick} style={{width:"100%",padding:12,background:`linear-gradient(135deg,${color},${color}dd)`,color:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:14,marginTop:4}}>{label}</button>
);

const DelBtn=({onClick})=>(
  <button onClick={onClick} className="action-btn" style={{background:"#ffebee",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",color:"#c62828",fontSize:13,fontWeight:600}}>Delete</button>
);

const TH=({children})=><th style={{padding:"11px 14px",textAlign:"left",color:"#e8f5e9",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:".7px"}}>{children}</th>;
const TD=({children,bold})=><td style={{padding:"10px 14px",borderBottom:"1px solid #edf4eb",fontWeight:bold?600:400,fontSize:13}}>{children}</td>;

function DataTable({cols,data,row}){
  return(
    <div style={{overflowX:"auto",borderRadius:12,border:"1.5px solid #e0eed9"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead>
          <tr style={{background:"linear-gradient(90deg,#1a3a2a,#2e5c20)"}}>
            {cols.map(c=><TH key={c}>{c}</TH>)}
          </tr>
        </thead>
        <tbody>
          {data.length===0?(
            <tr><td colSpan={cols.length} style={{textAlign:"center",padding:32,color:"#999",fontSize:14}}>No records found. Click "Add" to get started.</td></tr>
          ):data.map((item,i)=>(
            <tr key={item.id||i} style={{background:i%2===0?"#fff":"#f7fbf5"}}>{row(item)}</tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

const PageHdr=({icon,title,sub,onAdd,addLabel="Add New"})=>(
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.8rem",flexWrap:"wrap",gap:12}}>
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      <div style={{width:50,height:50,borderRadius:14,background:"linear-gradient(135deg,#2e7d32,#4caf50)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
        {icon}
      </div>
      <div>
        <h2 style={{margin:0,fontFamily:"'Playfair Display',serif",color:"#1a3a2a",fontSize:"1.5rem"}}>{title}</h2>
        {sub&&<p style={{margin:0,color:"#6b8f5e",fontSize:13,marginTop:2}}>{sub}</p>}
      </div>
    </div>
    {onAdd&&(
      <button onClick={onAdd} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 20px",background:"linear-gradient(135deg,#2e7d32,#43a047)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:14,boxShadow:"0 4px 12px rgba(46,125,50,.3)"}}>
        ＋ {addLabel}
      </button>
    )}
  </div>
);

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({data}){
  const rev=data.sales.reduce((s,x)=>s+Number(x.price||0)*Number(x.qty||1),0);
  const exp=data.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const profit=rev-exp;
  const stats=[
    {label:"Crops",value:data.crops.length,icon:"🌽",color:"#2e7d32",bg:"#e8f5e9"},
    {label:"Livestock",value:data.livestock.length,icon:"🐄",color:"#1565c0",bg:"#e3f2fd"},
    {label:"Workers",value:data.workers.length,icon:"👷",color:"#6a1b9a",bg:"#f3e5f5"},
    {label:"Inventory Items",value:data.inventory.length,icon:"📦",color:"#e65100",bg:"#fff3e0"},
    {label:"Suppliers",value:data.suppliers.length,icon:"🤝",color:"#00695c",bg:"#e0f2f1"},
    {label:"Sales Records",value:data.sales.length,icon:"💰",color:"#c62828",bg:"#ffebee"},
  ];
  const recentSales=[...data.sales].reverse().slice(0,4);
  const lowStock=data.inventory.filter(i=>Number(i.qty)<=Number(i.minQty||0));
  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{margin:"0 0 4px",fontFamily:"'Playfair Display',serif",color:"#1a3a2a",fontSize:"1.8rem"}}>Good Morning 🌤️</h2>
        <p style={{margin:0,color:"#6b8f5e"}}>Welcome to Tali Agro Farm & Processing Management System.</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14,marginBottom:24}}>
        {stats.map(s=>(
          <div key={s.label} className="card-hover" style={{background:"#fff",borderRadius:14,padding:"1.2rem",boxShadow:"0 2px 10px rgba(0,0,0,.06)",borderLeft:`4px solid ${s.color}`,transition:"all .2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:28,fontWeight:800,color:s.color}}>{s.value}</div>
                <div style={{fontSize:12,color:"#888",marginTop:2}}>{s.label}</div>
              </div>
              <div style={{width:40,height:40,borderRadius:10,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{s.icon}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:24}}>
        {[
          {label:"Total Revenue",value:`MK ${rev.toLocaleString()}`,color:"#2e7d32",icon:"↑"},
          {label:"Total Expenses",value:`MK ${exp.toLocaleString()}`,color:"#c62828",icon:"↓"},
          {label:"Net Profit",value:`MK ${profit.toLocaleString()}`,color:profit>=0?"#1565c0":"#c62828",icon:"="},
        ].map(c=>(
          <div key={c.label} style={{background:"#fff",borderRadius:14,padding:"1.4rem",boxShadow:"0 2px 10px rgba(0,0,0,.06)",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:4}}>{c.icon}</div>
            <div style={{fontSize:20,fontWeight:800,color:c.color}}>{c.value}</div>
            <div style={{fontSize:12,color:"#888"}}>{c.label}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,flexWrap:"wrap"}}>
        <div style={{background:"#fff",borderRadius:14,padding:"1.4rem",boxShadow:"0 2px 10px rgba(0,0,0,.06)",minWidth:0}}>
          <h3 style={{margin:"0 0 1rem",fontFamily:"'Playfair Display',serif",color:"#1a3a2a",fontSize:"1.1rem"}}>📋 Recent Sales</h3>
          {recentSales.length===0?<p style={{color:"#999",fontSize:13}}>No sales yet.</p>:
          recentSales.map(s=>(
            <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f0f0f0"}}>
              <div>
                <div style={{fontWeight:600,fontSize:13,color:"#1a3a2a"}}>{s.customer}</div>
                <div style={{fontSize:12,color:"#888"}}>{s.product}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:700,fontSize:13,color:"#2e7d32"}}>MK {(Number(s.price)*Number(s.qty||1)).toLocaleString()}</div>
                <Badge text={s.payment} color={s.payment==="Paid"?"green":"yellow"}/>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:"#fff",borderRadius:14,padding:"1.4rem",boxShadow:"0 2px 10px rgba(0,0,0,.06)",minWidth:0}}>
          <h3 style={{margin:"0 0 1rem",fontFamily:"'Playfair Display',serif",color:"#1a3a2a",fontSize:"1.1rem"}}>⚠️ Low Stock Alerts</h3>
          {lowStock.length===0?<p style={{color:"#4caf50",fontSize:13,fontWeight:600}}>✓ All stock levels are adequate.</p>:
          lowStock.map(i=>(
            <div key={i.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f0f0f0"}}>
              <span style={{fontWeight:600,fontSize:13}}>{i.item}</span>
              <Badge text={`${i.qty} ${i.unit}`} color="red"/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── CROPS ─────────────────────────────────────────────────────────────────────
function Crops({crops,set}){
  const [modal,setModal]=useState(false);
  const [f,setF]=useState({name:"Maize",field:"",date:"",status:"Seedling",notes:""});
  const save=()=>{set(p=>[...p,{id:Date.now(),...f}]);setModal(false);setF({name:"Maize",field:"",date:"",status:"Seedling",notes:""});};
  return(
    <div>
      <PageHdr icon="🌽" title="Crop Management" sub="Track all crop varieties, planting dates and field sections" onAdd={()=>setModal(true)} addLabel="Add Crop"/>
      <DataTable cols={["Crop","Farm Section","Plant Date","Status","Notes","Action"]} data={crops} row={c=>[
        <TD key="n" bold>{c.name}</TD>,
        <TD key="f">{c.field}</TD>,
        <TD key="d">{c.date}</TD>,
        <TD key="s"><Badge text={c.status} color={c.status==="Harvested"?"blue":c.status==="Growing"?"green":"yellow"}/></TD>,
        <TD key="no">{c.notes||"—"}</TD>,
        <TD key="a"><DelBtn onClick={()=>set(p=>p.filter(x=>x.id!==c.id))}/></TD>,
      ]}/>
      {modal&&<Modal title="Add Crop Record" onClose={()=>setModal(false)}>
        <Sel label="Crop Type" value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))}>
          {["Maize","Soyabean","Beans","Groundnuts","Vegetables","Other"].map(x=><option key={x}>{x}</option>)}
        </Sel>
        <Inp label="Farm Section" placeholder="e.g. Block A" value={f.field} onChange={e=>setF(p=>({...p,field:e.target.value}))}/>
        <Inp label="Planting Date" type="date" value={f.date} onChange={e=>setF(p=>({...p,date:e.target.value}))}/>
        <Sel label="Status" value={f.status} onChange={e=>setF(p=>({...p,status:e.target.value}))}>
          {["Seedling","Growing","Flowering","Harvested"].map(x=><option key={x}>{x}</option>)}
        </Sel>
        <Txt label="Notes" placeholder="Optional notes" value={f.notes} onChange={e=>setF(p=>({...p,notes:e.target.value}))} style={{minHeight:60}}/>
        <SaveBtn onClick={save} label="Save Crop"/>
      </Modal>}
    </div>
  );
}

// ── LIVESTOCK ─────────────────────────────────────────────────────────────────
function Livestock({livestock,set}){
  const [modal,setModal]=useState(false);
  const [f,setF]=useState({type:"Cattle",breed:"",tag:"",health:"Healthy",vaccination:"Up to date",count:1,notes:""});
  const save=()=>{set(p=>[...p,{id:Date.now(),...f}]);setModal(false);};
  return(
    <div>
      <PageHdr icon="🐄" title="Livestock Management" sub="Track animals, health records and vaccinations" onAdd={()=>setModal(true)} addLabel="Add Animal"/>
      <DataTable cols={["Type","Breed","Tag #","Count","Health","Vaccination","Action"]} data={livestock} row={a=>[
        <TD key="t" bold>{a.type}</TD>,
        <TD key="b">{a.breed}</TD>,
        <TD key="tg">{a.tag}</TD>,
        <TD key="c">{a.count}</TD>,
        <TD key="h"><Badge text={a.health} color={a.health==="Healthy"?"green":"red"}/></TD>,
        <TD key="v"><Badge text={a.vaccination} color={a.vaccination==="Up to date"?"blue":"yellow"}/></TD>,
        <TD key="a"><DelBtn onClick={()=>set(p=>p.filter(x=>x.id!==a.id))}/></TD>,
      ]}/>
      {modal&&<Modal title="Add Livestock" onClose={()=>setModal(false)}>
        <Sel label="Animal Type" value={f.type} onChange={e=>setF(p=>({...p,type:e.target.value}))}>
          {["Cattle","Goat","Sheep","Poultry","Pig","Other"].map(x=><option key={x}>{x}</option>)}
        </Sel>
        <Inp label="Breed" placeholder="e.g. Friesian" value={f.breed} onChange={e=>setF(p=>({...p,breed:e.target.value}))}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Tag Number" placeholder="e.g. COW-001" value={f.tag} onChange={e=>setF(p=>({...p,tag:e.target.value}))}/>
          <Inp label="Count" type="number" min="1" value={f.count} onChange={e=>setF(p=>({...p,count:e.target.value}))}/>
        </div>
        <Sel label="Health Status" value={f.health} onChange={e=>setF(p=>({...p,health:e.target.value}))}>
          {["Healthy","Sick","Under Treatment","Quarantined"].map(x=><option key={x}>{x}</option>)}
        </Sel>
        <Sel label="Vaccination Status" value={f.vaccination} onChange={e=>setF(p=>({...p,vaccination:e.target.value}))}>
          {["Up to date","Due soon","Overdue","Not vaccinated"].map(x=><option key={x}>{x}</option>)}
        </Sel>
        <Txt label="Notes" value={f.notes} onChange={e=>setF(p=>({...p,notes:e.target.value}))} style={{minHeight:60}}/>
        <SaveBtn onClick={save} color="#1565c0" label="Save Animal"/>
      </Modal>}
    </div>
  );
}

// ── WORKERS ───────────────────────────────────────────────────────────────────
function Workers({workers,set}){
  const [modal,setModal]=useState(false);
  const [f,setF]=useState({name:"",role:"",phone:"",salary:"",status:"Active",joined:""});
  const save=()=>{set(p=>[...p,{id:Date.now(),...f}]);setModal(false);};
  const payroll=workers.reduce((s,w)=>s+Number(w.salary||0),0);
  return(
    <div>
      <PageHdr icon="👷" title="Worker Management" sub={`${workers.length} staff · Monthly payroll: MK ${payroll.toLocaleString()}`} onAdd={()=>setModal(true)} addLabel="Add Worker"/>
      <DataTable cols={["Name","Role","Phone","Monthly Salary","Status","Joined","Action"]} data={workers} row={w=>[
        <TD key="n" bold>{w.name}</TD>,

          ))}
        </div>
        <div style={{marginTop:16,display:"flex",gap:10}}>
          {view.phone&&<a href={`tel:${view.phone}`} style={{flex:1,padding:10,background:"#e8f5e9",borderRadius:8,textAlign:"center",color:"#2e7d32",fontWeight:700,fontSize:14,textDecoration:"none"}}>📞 Call</a>}
          {view.email&&<a href={`mailto:${view.email}`} style={{flex:1,padding:10,background:"#e3f2fd",borderRadius:8,textAlign:"center",color:"#1565c0",fontWeight:700,fontSize:14,textDecoration:"none"}}>✉️ Email</a>}
        </div>
      </Modal>}
    </div>
  );
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
function Reports({data}){
  const rev=data.sales.reduce((s,x)=>s+Number(x.price||0)*Number(x.qty||1),0);
  const exp=data.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const profit=rev-exp;
  const margin=rev>0?((profit/rev)*100).toFixed(1):0;
  const totalHarvest=data.harvest.reduce((s,h)=>s+Number(h.qty||0),0);
  const totalAnimals=data.livestock.reduce((s,l)=>s+Number(l.count||0),0);
  const expByType=data.expenses.reduce((a,e)=>{a[e.type]=(a[e.type]||0)+Number(e.amount||0);return a;},{});
  const salesByProd=data.sales.reduce((a,s)=>{const k=s.product;a[k]=(a[k]||0)+Number(s.price||0)*Number(s.qty||1);return a;},{});
  const RC=({title,color,children})=>(
    <div style={{background:"#fff",borderRadius:14,padding:"1.4rem",boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:18,borderTop:`4px solid ${color}`}}>
      <h3 style={{margin:"0 0 1rem",fontFamily:"'Playfair Display',serif",color:"#1a3a2a",fontSize:"1.1rem"}}>{title}</h3>
      {children}
    </div>
  );
  const Bar=({label,value,max,color})=>(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
        <span style={{fontWeight:600}}>{label}</span>
        <span style={{color:"#888"}}>MK {Number(value).toLocaleString()}</span>
      </div>
      <div style={{background:"#f0f0f0",borderRadius:6,height:9}}>
        <div style={{width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:6,height:9,transition:"width .5s"}}/>
      </div>
    </div>
  );
  const maxExp=Math.max(...Object.values(expByType),1);
  const maxSales=Math.max(...Object.values(salesByProd),1);
  return(
    <div>
      <PageHdr icon="📈" title="Reports & Analytics" sub="Comprehensive farm performance overview"/>
      <RC title="📊 Profit & Loss Summary" color="#2e7d32">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:14}}>
          {[
            {l:"Total Revenue",v:`MK ${rev.toLocaleString()}`,c:"#2e7d32"},
            {l:"Total Expenses",v:`MK ${exp.toLocaleString()}`,c:"#c62828"},
            {l:"Net Profit",v:`MK ${profit.toLocaleString()}`,c:profit>=0?"#1565c0":"#c62828"},
            {l:"Profit Margin",v:`${margin}%`,c:profit>=0?"#00695c":"#c62828"},
          ].map(x=>(
            <div key={x.l} style={{textAlign:"center",padding:"1rem",background:"#f8fdf6",borderRadius:10}}>
              <div style={{fontSize:20,fontWeight:800,color:x.c}}>{x.v}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
      </RC>
      <RC title="🌾 Production Summary" color="#4caf50">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:14}}>
          {[
            {l:"Crop Records",v:data.crops.length},{l:"Total Harvest",v:`${totalHarvest} units`},
            {l:"Processing Batches",v:data.processing.length},{l:"Total Animals",v:totalAnimals},
            {l:"Suppliers",v:data.suppliers.length},{l:"Workers",v:data.workers.length},
          ].map(x=>(
            <div key={x.l} style={{textAlign:"center",padding:"1rem",background:"#e8f5e9",borderRadius:10}}>
              <div style={{fontSize:20,fontWeight:800,color:"#1b5e20"}}>{x.v}</div>
              <div style={{fontSize:11,color:"#4a7c59",marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
      </RC>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <RC title="💸 Expenses by Category" color="#f57c00">
          {Object.entries(expByType).length===0?<p style={{color:"#999",fontSize:13}}>No expense data yet.</p>:
          Object.entries(expByType).map(([k,v])=><Bar key={k} label={k} value={v} max={maxExp} color="#f57c00"/>)}
        </RC>
        <RC title="🛒 Revenue by Product" color="#1565c0">
          {Object.entries(salesByProd).length===0?<p style={{color:"#999",fontSize:13}}>No sales data yet.</p>:
          Object.entries(salesByProd).map(([k,v])=><Bar key={k} label={k} value={v} max={maxSales} color="#1565c0"/>)}
        </RC>
      </div>
      <RC title="🏆 Supplier Summary" color="#00695c">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:14}}>
          {[
            {l:"Total Suppliers",v:data.suppliers.length},
            {l:"Excellent Rated",v:data.suppliers.filter(s=>s.rating==="Excellent").length},
            {l:"Credit Terms",v:data.suppliers.filter(s=>s.terms.includes("credit")).length},
            {l:"Categories",v:[...new Set(data.suppliers.map(s=>s.category))].length},
          ].map(x=>(
            <div key={x.l} style={{textAlign:"center",padding:"1rem",background:"#e0f2f1",borderRadius:10}}>
              <div style={{fontSize:20,fontWeight:800,color:"#004d40"}}>{x.v}</div>
              <div style={{fontSize:11,color:"#00695c",marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
      </RC>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [u,setU]=useState(""),  [p,setP]=useState(""),  [err,setErr]=useState("");
  const go=()=>{
    if(u==="admin"&&p==="tali123") onLogin();
    else setErr("Invalid username or password.");
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#0d2818,#1b4332 45%,#2d6a4f)",position:"relative",overflow:"hidden"}}>
      {[["-120px","-100px","380px"],["60%","55%","260px"],["10%","70%","180px"]].map(([l,t,s],i)=>(
        <div key={i} style={{position:"absolute",left:l,top:t,width:s,height:s,borderRadius:"50%",background:"rgba(255,255,255,.04)",pointerEvents:"none"}}/>
      ))}
      <div style={{background:"rgba(255,255,255,.08)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,.15)",borderRadius:24,padding:"3rem 2.5rem",width:380,boxShadow:"0 30px 80px rgba(0,0,0,.5)",position:"relative"}}>
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div style={{width:78,height:78,borderRadius:20,margin:"0 auto 1rem",background:"linear-gradient(135deg,#d4a017,#f5c842)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,boxShadow:"0 8px 24px rgba(212,160,23,.4)"}}>🌾</div>
          <h1 style={{margin:0,color:"#fff",fontFamily:"'Playfair Display',serif",fontSize:"1.55rem"}}>Tali Agro Farm</h1>
          <p style={{margin:"4px 0 0",color:"rgba(255,255,255,.55)",fontSize:13}}>Farm & Processing Management System</p>
        </div>
        {["Username","Password"].map((label,i)=>(
          <input key={label} type={i===1?"password":"text"} placeholder={label}
            value={i===0?u:p} onChange={e=>i===0?setU(e.target.value):setP(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&go()}
            style={{width:"100%",padding:"12px 16px",background:"rgba(255,255,255,.1)",border:"1.5px solid rgba(255,255,255,.2)",borderRadius:10,color:"#fff",fontSize:15,outline:"none",boxSizing:"border-box",marginBottom:12,display:"block"}}
          />
        ))}
        {err&&<p style={{color:"#ff8a80",fontSize:13,textAlign:"center",margin:"0 0 10px"}}>{err}</p>}
        <button onClick={go} style={{width:"100%",padding:13,background:"linear-gradient(135deg,#d4a017,#e8b820)",border:"none",borderRadius:10,color:"#1a1a00",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 6px 18px rgba(212,160,23,.4)"}}>
          Sign In →
        </button>
        <p style={{textAlign:"center",color:"rgba(255,255,255,.35)",fontSize:12,marginTop:14}}>admin / tali123</p>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
const NAV=[
  {id:"dashboard",label:"Dashboard",icon:"🏠"},
  {id:"crops",label:"Crops",icon:"🌽"},
  {id:"livestock",label:"Livestock",icon:"🐄"},
  {id:"workers",label:"Workers",icon:"👷"},
  {id:"inventory",label:"Inventory",icon:"📦"},
  {id:"harvest",label:"Harvest",icon:"🌾"},
  {id:"processing",label:"Processing",icon:"⚙️"},
  {id:"sales",label:"Sales",icon:"💰"},
  {id:"expenses",label:"Expenses",icon:"📊"},
  {id:"suppliers",label:"Suppliers",icon:"🤝"},
  {id:"reports",label:"Reports",icon:"📈"},
];

function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [page,setPage]=useState("dashboard");
  const [data,setData]=useState(()=>loadData());
  const [sideOpen,setSideOpen]=useState(true);

  useEffect(()=>{saveData(data);},[data]);

  const set=key=>fn=>setData(prev=>({...prev,[key]:typeof fn==="function"?fn(prev[key]):fn}));

  if(!loggedIn) return <Login onLogin={()=>setLoggedIn(true)}/>;

  const pages={
    dashboard:<Dashboard data={data}/>,
    crops:<Crops crops={data.crops} set={set("crops")}/>,
    livestock:<Livestock livestock={data.livestock} set={set("livestock")}/>,
    workers:<Workers workers={data.workers} set={set("workers")}/>,
    inventory:<Inventory inventory={data.inventory} set={set("inventory")}/>,
    harvest:<Harvest harvest={data.harvest} set={set("harvest")}/>,
    processing:<Processing processing={data.processing} set={set("processing")}/>,
    sales:<Sales sales={data.sales} set={set("sales")}/>,
    expenses:<Expenses expenses={data.expenses} set={set("expenses")}/>,
    suppliers:<Suppliers suppliers={data.suppliers} set={set("suppliers")}/>,
    reports:<Reports data={data}/>,
  };

  return(
    <div style={{display:"flex",minHeight:"100vh",background:"#f0f5ee",fontFamily:"'DM Sans',sans-serif"}}>
      {/* SIDEBAR */}
      <div className="sidebar" style={{width:sideOpen?240:64,background:"linear-gradient(180deg,#0d2818,#1a3a2a 55%,#1b4332)",display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",overflowY:"auto",flexShrink:0,transition:"width .25s",zIndex:100}}>
        <div style={{padding:sideOpen?"1.6rem 1.2rem .8rem":"1rem .8rem",borderBottom:"1px solid rgba(255,255,255,.08)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:11,background:"linear-gradient(135deg,#d4a017,#f5c842)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,cursor:"pointer",boxShadow:"0 4px 12px rgba(212,160,23,.35)"}} onClick={()=>setSideOpen(o=>!o)}>🌾</div>
          {sideOpen&&<div className="logo-text"><div style={{color:"#fff",fontWeight:800,fontSize:13,lineHeight:1.2}}>Tali Agro</div><div style={{color:"rgba(255,255,255,.4)",fontSize:11}}>Farm & Processing</div></div>}
        </div>
        <nav style={{flex:1,padding:sideOpen?"1rem .75rem":"1rem .4rem"}}>
          {NAV.map(n=>{
            const active=page===n.id;
            return(
              <button key={n.id} onClick={()=>setPage(n.id)} className="nav-btn"
                title={!sideOpen?n.label:""}
                style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:sideOpen?"10px 12px":"10px 0",justifyContent:sideOpen?"flex-start":"center",marginBottom:2,border:"none",cursor:"pointer",borderRadius:10,textAlign:"left",fontSize:13,fontWeight:active?700:500,background:active?"rgba(212,160,23,.18)":"transparent",color:active?"#f5c842":"rgba(255,255,255,.6)",transition:"all .15s",borderLeft:active?"3px solid #f5c842":"3px solid transparent"}}>
                <span style={{fontSize:17,flexShrink:0}}>{n.icon}</span>
                {sideOpen&&<span className="nav-label">{n.label}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:sideOpen?"1rem .75rem":"1rem .4rem",borderTop:"1px solid rgba(255,255,255,.08)"}}>
          <button onClick={()=>setLoggedIn(false)} title={!sideOpen?"Sign Out":""}
            style={{display:"flex",alignItems:"center",gap:10,justifyContent:sideOpen?"flex-start":"center",width:"100%",padding:sideOpen?"10px 12px":"10px 0",border:"none",cursor:"pointer",borderRadius:10,background:"rgba(255,100,100,.1)",color:"#ff8a80",fontSize:13,fontWeight:600}}>
            <span style={{fontSize:17}}>🚪</span>
            {sideOpen&&<span>Sign Out</span>}
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,overflow:"auto",minWidth:0}}>
        {/* Top bar */}
        <div style={{background:"#fff",borderBottom:"1px solid #e4ede0",padding:"1rem 1.8rem",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:"#1a3a2a"}}>{NAV.find(n=>n.id===page)?.icon} {NAV.find(n=>n.id===page)?.label}</div>
            <div style={{fontSize:12,color:"#aaa",marginTop:1}}>Tali Agro Farm & Processing Ltd. · {new Date().toLocaleDateString("en-GB",{year:"numeric",month:"long"})}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1a3a2a"}}>Admin</div>
              <div style={{fontSize:11,color:"#888"}}>Farm Manager</div>
            </div>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#2e7d32,#43a047)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:14}}>A</div>
          </div>
        </div>
        {/* Content */}
        <div style={{padding:"1.8rem",maxWidth:1300,margin:"0 auto"}}>
          {pages[page]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
