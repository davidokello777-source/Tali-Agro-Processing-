<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tali Agro - Farm Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:0;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS & COMPONENTS FROM YOUR FILE ---
        const Icon = ({ name, size = 20 }) => {
            const icons = {
                leaf: "M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 1-8 1 9-3.9 5 7 5 7-2.8-3-6-2-9.5-.13l4.28 4.28L17 8z",
                dashboard: "M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z",
                logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                    <path d={icons[name] || icons.leaf} />
                </svg>
            );
        };

        // --- LOGIN PAGE ---
        const LoginPage = ({ onLogin }) => {
            const [u, setU] = useState("");
            const [p, setP] = useState("");
            const handle = () => { if (u === "admin" && p === "tali123") onLogin(); };
            return (
                <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#0d2818", color: "white", fontFamily: "sans-serif" }}>
                    <div style={{ background: "rgba(255,255,255,0.1)", padding: "40px", borderRadius: "20px", textAlign: "center", border: "1px solid rgba(255,255,255,0.2)" }}>
                        <Icon name="leaf" size={50} />
                        <h2>Tali Agro Login</h2>
                        <input type="text" placeholder="Username" onChange={e => setU(e.target.value)} style={{ display:"block", margin:"10px auto", padding:"10px", borderRadius:"5px", border:"none" }} />
                        <input type="password" placeholder="Password" onChange={e => setP(e.target.value)} style={{ display:"block", margin:"10px auto", padding:"10px", borderRadius:"5px", border:"none" }} />
                        <button onClick={handle} style={{ background: "#d4a017", padding: "10px 20px", border: "none", borderRadius: "5px", cursor: "pointer", fontWeight: "bold" }}>Sign In</button>
                        <p style={{fontSize: "10px", marginTop: "10px"}}>admin / tali123</p>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [loggedIn, setLoggedIn] = useState(false);
            if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;

            return (
                <div style={{ fontFamily: 'DM Sans, sans-serif', padding: '20px' }}>
                    <h1>Tali Agro System Active</h1>
                    <p>Welcome, Admin. The farm management dashboard is now running via GitHub Pages.</p>
                    <button onClick={() => setLoggedIn(false)} style={{color: "red"}}>Sign Out</button>
                </div>
            );
        }

        // 3. Render the App into the root div
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
